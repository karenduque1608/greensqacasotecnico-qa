webdriver {
  driver = chrome

  capabilities {
    browserName = "chrome"
    "goog:chromeOptions" {
      args = [
        "--start-maximized",
        "--disable-popup-blocking",
        "--disable-notifications"
      ]
    }
  }
}

serenity {

  project.name = "LATAM Automation Challenge"

  take.screenshots = FOR_FAILURES

  timeout = 10000

  restart.browser.for.each = scenario
}

headless.mode = false